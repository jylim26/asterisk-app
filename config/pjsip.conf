[global]
type=global
user_agent=Asterisk PBX

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0
local_net=${LOCAL_NET}
external_media_address=${EXTERNAL_IP}
external_signaling_address=${EXTERNAL_IP}

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0
local_net=${LOCAL_NET}
external_media_address=${EXTERNAL_IP}
external_signaling_address=${EXTERNAL_IP}

; === 공통 템플릿 ===
[endpoint-default](!)
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
allow=opus
allow=g722
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[auth-default](!)
type=auth
auth_type=userpass

[aor-default](!)
type=aor
max_contacts=1
qualify_frequency=30

; === 내선 1001 ===
[1001](endpoint-default)
auth=1001
aors=1001

[1001](auth-default)
username=1001
password=${SIP_1001_PASSWORD}

[1001](aor-default)

; === 내선 1002 ===
[1002](endpoint-default)
auth=1002
aors=1002

[1002](auth-default)
username=1002
password=${SIP_1002_PASSWORD}

[1002](aor-default)
