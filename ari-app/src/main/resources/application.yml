spring:
  application:
    name: ari-app

server:
  port: 8080

ari:
  host: ${ARI_HOST:localhost}
  port: ${ARI_PORT:8088}
  username: ${ARI_USERNAME:asterisk}
  password: ${ARI_PASSWORD:asterisk}
  app-name: ${ARI_APP_NAME:ari-app}
  reconnect:
    initial-delay-ms: 1000
    max-delay-ms: 30000
    max-attempts: 0

logging:
  level:
    root: INFO
    com.example.ari: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
