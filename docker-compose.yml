services:
  asterisk:
    build: .
    container_name: asterisk
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      - ./config:/etc/asterisk-templates:ro
      - ./entrypoint.sh:/entrypoint.sh
      - asterisk-config:/etc/asterisk
      - asterisk-logs:/var/log/asterisk
      - asterisk-spool:/var/spool/asterisk
    entrypoint: /entrypoint.sh
    environment:
      - TZ=Asia/Seoul

  ari-app:
    build: ./ari-app
    container_name: ari-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
      - ARI_HOST=localhost
      - ARI_PORT=8088
      - ARI_USERNAME=asterisk
    depends_on:
      - asterisk

volumes:
  asterisk-config:
  asterisk-logs:
  asterisk-spool:
